services:
  pergamon:
    build: .
    image: pergamon:latest
    # Map the host port to the container. Adjust the host side (left) if 3000
    # is taken, e.g. "8080:3000". For production, front this with a reverse
    # proxy (TLS) instead of exposing the port directly — see docs/docker.md.
    ports:
      - "3000:3000"
    volumes:
      - pergamon-data:/data
    environment:
      # Override the log level/filter as needed (error, warn, info, debug, trace).
      RUST_LOG: ${RUST_LOG:-info}
      # Protect the /admin diagnostics routes with HTTP Basic auth. Both must be
      # set to enable it. The rest of the UI has no built-in auth — front it with
      # a reverse proxy for authentication and TLS (see docs/docker.md).
      # PERGAMON_ADMIN_USER: admin
      # PERGAMON_ADMIN_PASSWORD: ${PERGAMON_ADMIN_PASSWORD}
    restart: unless-stopped

volumes:
  pergamon-data:
