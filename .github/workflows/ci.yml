name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Change detection ──────────────────────────────────────────────────────────
  # Determines which component groups were modified so downstream jobs can skip
  # irrelevant work on PRs. Push-to-main always runs everything.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.*'
              - 'rust-toolchain.toml'
            docs:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'

  # ── Documentation ─────────────────────────────────────────────────────────────

  markdown:
    name: Markdown lint
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: "**/*.md"

  # ── Rust checks ───────────────────────────────────────────────────────────────

  check:
    name: Check
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  test:
    name: Test
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: MSRV (1.95)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-features

  audit:
    name: Security audit
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Summary gate ──────────────────────────────────────────────────────────────
  # Single required status check for branch protection. Downstream jobs may be
  # skipped (path filters) — that is OK; only failures or cancellations block.
  ci:
    name: CI
    if: always()
    needs: [changes, markdown, check, test, clippy, fmt, msrv, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All checks passed
        run: echo "All CI checks passed"
