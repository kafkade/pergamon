version: 2

updates:
  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # The dtolnay/rust-toolchain ref pins our MSRV (e.g. @1.95), not an
      # action release. Dependabot keeps "upgrading" it to non-existent Rust
      # versions (see #89, #100), which breaks the MSRV CI job. Bump it
      # manually when the MSRV changes.
      - dependency-name: "dtolnay/rust-toolchain"
