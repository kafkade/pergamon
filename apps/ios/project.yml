name: PergamonSpike

# Generated by `xcodegen` (do not edit the .xcodeproj by hand).
#   brew install xcodegen      # one-time
#   ./scripts/build-ios.sh     # build the Rust XCFramework + bindings
#   cd apps/ios && xcodegen generate
#   xcodebuild -project PergamonSpike.xcodeproj -scheme PergamonSpike \
#       -destination 'platform=iOS Simulator,name=iPhone 17' build

options:
  bundleIdPrefix: dev.pergamon
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  PergamonSpike:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PergamonSpike
    dependencies:
      # Static-library XCFramework produced by scripts/build-ios.sh. It is not
      # embedded (static linkage); its module.modulemap exposes the
      # `pergamon_uniffiFFI` Clang module the generated Swift imports.
      - framework: Frameworks/PergamonFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pergamon.spike
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: pergamon
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
